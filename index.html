function parseExp(d){
  if(!d)return null;
  const mm=[
    /(\d+)\s*[-–to]\s*(\d+)\s*years?/i,
    /minimum\s+(\d+)\s+years?/i,
    /at\s+least\s+(\d+)\s+years?/i,
    /(\d+)\+\s*years?/i,
    /(\d+)\s*years?\s+(?:of\s+)?(?:experience|relevant|hands.on|professional)/i,
    /experience[:\s]+(\d+)/i,
    /(\d+)\s*years?\s+experience/i,
  ];
  for(const p of mm){const m=d.match(p);if(m)return parseInt(m[1]);}
  return null;
}
function senL(s){
  if(!s||s==='Not Applicable')return'';
  if(/entry/i.test(s))return'Entry';
  if(/associate/i.test(s))return'Associate';
  if(/mid.senior/i.test(s))return'Mid-Senior';
  if(/director/i.test(s))return'Director';

function ago(iso){
  const d=Math.floor((Date.now()-new Date(iso))/86400000);
  if(d===0)return'Today';if(d===1)return'1d ago';
  if(d<7)return d+'d ago';
  if(d<14)return'1w ago';
  if(d<21)return'2w ago';

/* ── process: parse exp, classify, filter ── */
const JOBS = RAW.map(j=>({
  ...j,
  expN: parseExp(j.desc),
  senShort: senL(j.sen),
  cat: cat(j.title),
})).filter(j => j.expN === null || j.expN < 5);

const CATS_LIST = ['All',...new Set(JOBS.map(j=>j.cat))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));
let activeCat = 'All';
let openId = null;

function filtered(){
  const q = document.getElementById('srch').value.trim().toLowerCase();
  const cf = document.getElementById('catSel').value;
  const sf = document.getElementById('senSel').value;
  const tf = document.getElementById('typSel').value;
  return JOBS.filter(j=>{
    if(activeCat!=='All' && j.cat!==activeCat) return false;
    if(cf && j.cat!==cf) return false;
    if(q && !j.title.toLowerCase().includes(q) && !j.co.toLowerCase().includes(q)) return false;
    if(sf && j.senShort!==sf) return false;
    if(tf && j.emp!==tf) return false;
    return true;
  });
}

function renderStats(jobs){
  const cats=new Set(jobs.map(j=>j.cat)).size;
  const ft=jobs.filter(j=>j.emp==='Full-time').length;
  const rem=jobs.filter(j=>j.remote).length;
  document.getElementById('stats').innerHTML=[
    {n:jobs.length,l:'Jobs'},
    {n:cats,l:'Categories'},
    {n:ft,l:'Full-time'},
    {n:rem,l:'Remote'},
  ].map(s=>`<div class="stat"><div class="stat-n">${s.n}</div><div class="stat-l">${s.l}</div></div>`).join('');
}

function renderCats(){
  document.getElementById('cats').innerHTML=CATS_LIST.map(c=>
    `<span class="ctab${activeCat===c?' on':''}" onclick="setCat('${c.replace(/&/g,'&amp;')}')">${c}</span>`
  ).join('');
}

function setCat(c){activeCat=c;openId=null;render();}
function toggle(id){openId=openId===id?null:id;render();}

function render(){
  const jobs=filtered();
  renderStats(jobs);
  renderCats();
  document.getElementById('resN').textContent=`${jobs.length} job${jobs.length!==1?'s':''} found`;
  const el=document.getElementById('list');
  if(!jobs.length){
    el.innerHTML=`<div class="empty"><h3>No jobs match</h3><p>Try adjusting your filters or search term.</p></div>`;
    return;
  }
  el.innerHTML=jobs.map(j=>{
    const isOpen=openId===j.id;
    const logoEl=j.logo
      ?`<img class="logo" src="${j.logo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="logo-fb" style="display:none">${initials(j.co)}</div>`
      :`<div class="logo-fb">${initials(j.co)}</div>`;
    const expLabel=j.expN!==null?`<span class="tag te">${j.expN}+ yrs</span>`:'';
    const senTag=j.senShort?`<span class="tag ts">${j.senShort}</span>`:'';
    const remTag=j.remote?`<span class="tag tr">Remote</span>`:'';
    const catTag=`<span class="tag ${CAT_TC[j.cat]||'tc-d'}">${j.cat}</span>`;
    return`<div class="card${isOpen?' open':''}" onclick="toggle('${j.id}')">
      <div class="card-head">
        ${logoEl}
        <div class="ci">
          <div class="top-row">
            <div class="jtitle">${j.title}</div>
            <div class="jtime">${ago(j.posted)}</div>
            <div class="chev">▾</div>
          </div>
          <div class="jco">${j.co} · Dubai, UAE</div>
          <div class="tags">${senTag}${expLabel}<span class="tag tt">${j.emp}</span>${remTag}${catTag}</div>
        </div>
      </div>
      <div class="detail">
        <p class="desc">${j.desc}</p>
        <div class="actions">
          <a class="btn-apply" href="${j.link}" target="_blank" onclick="event.stopPropagation()">View on LinkedIn ↗</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
