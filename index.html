<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dubai Design Jobs · Live Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#f7f4ef;--sand2:#ede9e1;--sand3:#ddd8cc;
  --ink:#1a1714;--ink2:#4a4540;--ink3:#8a847c;
  --accent:#c4622d;--accent2:#e8845a;
  --green:#2d7a4f;--green-bg:#edf7f2;
  --blue:#1a5fb4;--blue-bg:#e8f0fb;
  --amber:#a05c00;--amber-bg:#fdf3e1;
  --red:#b01a1a;--red-bg:#fdeaea;
  --card:#ffffff;--border:rgba(26,23,20,0.09);--border2:rgba(26,23,20,0.16);
  --shadow:0 1px 3px rgba(26,23,20,0.07),0 4px 12px rgba(26,23,20,0.05);
  --r:10px;--r2:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.5}

/* ── HEADER ── */
.page-header{background:var(--ink);color:#fff;padding:2rem 2rem 1.5rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.site-title{font-size:22px;font-weight:600;letter-spacing:-0.3px}
.site-title span{color:var(--accent2)}
.header-meta{font-size:12px;color:rgba(255,255,255,0.45);margin-top:3px;font-family:'DM Mono',monospace}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,0.7)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── CONTROLS ── */
.controls-wrap{background:var(--ink);border-top:1px solid rgba(255,255,255,0.07);padding:0 2rem 1rem}
.controls-inner{max-width:900px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-box{position:relative;flex:1;min-width:200px}
.search-box input{width:100%;padding:9px 12px 9px 36px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--r);background:rgba(255,255,255,0.07);color:#fff;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.search-box input::placeholder{color:rgba(255,255,255,0.35)}
.search-box input:focus{border-color:rgba(255,255,255,0.35)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;font-size:14px}
.ctrl-select{padding:9px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--r);background:rgba(255,255,255,0.07);color:#fff;font-family:inherit;font-size:13px;outline:none;cursor:pointer;min-width:130px}
.ctrl-select option{background:#2a2520;color:#fff}

/* ── BODY ── */
.body-wrap{max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 4rem}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center}
.stat-n{font-size:26px;font-weight:600;color:var(--accent);line-height:1}
.stat-l{font-size:11px;color:var(--ink3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

/* ── CATEGORY PILLS ── */
.cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.cat-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);font-size:12px;cursor:pointer;color:var(--ink2);background:var(--card);transition:all .15s;white-space:nowrap;font-weight:500}
.cat-pill:hover{border-color:var(--accent);color:var(--accent)}
.cat-pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── RESULTS COUNT ── */
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.results-count{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace}
.sort-label{font-size:12px;color:var(--ink3)}

/* ── JOB CARDS ── */
.job-list{display:flex;flex-direction:column;gap:10px}
.job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer}
.job-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.job-card.open{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,98,45,0.08)}
.card-main{display:flex;gap:14px;padding:16px 18px;align-items:flex-start}
.company-logo{width:44px;height:44px;border-radius:9px;object-fit:contain;border:1px solid var(--border);background:var(--sand);flex-shrink:0}
.logo-fb{width:44px;height:44px;border-radius:9px;border:1px solid var(--border);background:var(--sand2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--ink3);flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.job-title{font-size:15px;font-weight:600;color:var(--ink);line-height:1.25;flex:1}
.card-time{font-size:11px;color:var(--ink3);white-space:nowrap;margin-top:2px;font-family:'DM Mono',monospace}
.job-company{font-size:13px;color:var(--ink2);margin-top:3px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.tag-sen{background:var(--blue-bg);color:var(--blue)}
.tag-exp{background:var(--green-bg);color:var(--green)}
.tag-type{background:var(--sand2);color:var(--ink2)}
.tag-remote{background:var(--amber-bg);color:var(--amber)}
.tag-cat{background:rgba(196,98,45,.1);color:var(--accent)}
.card-chevron{font-size:12px;color:var(--ink3);transition:transform .2s;margin-top:2px;flex-shrink:0}
.job-card.open .card-chevron{transform:rotate(180deg)}

/* ── EXPANDED ── */
.card-detail{display:none;border-top:1px solid var(--border);padding:16px 18px;background:var(--sand)}
.job-card.open .card-detail{display:block}
.detail-desc{font-size:13px;color:var(--ink2);line-height:1.65;max-height:180px;overflow-y:auto;padding-right:4px}
.detail-desc::-webkit-scrollbar{width:4px}
.detail-desc::-webkit-scrollbar-thumb{background:var(--sand3);border-radius:2px}
.detail-actions{display:flex;gap:8px;margin-top:12px}
.btn-apply{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);background:var(--accent);color:#fff;font-size:13px;font-weight:500;text-decoration:none;transition:background .15s}
.btn-apply:hover{background:#a8501f}
.btn-li{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r);border:1px solid var(--border2);color:var(--ink2);font-size:13px;font-weight:500;text-decoration:none;background:var(--card);transition:border-color .15s}
.btn-li:hover{border-color:var(--accent);color:var(--accent)}

/* ── EMPTY ── */
.empty{text-align:center;padding:4rem 1rem;color:var(--ink3)}
.empty-icon{font-size:36px;margin-bottom:.75rem;opacity:.4}
.empty-text{font-size:14px}

/* ── FOOTER ── */
.footer{text-align:center;padding:1rem;font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2rem}
</style>
</head>

<script>
/* ── DATA ── parsed & enriched from Apify run g7l1lwghkcY95UfIQ ── */
function parseExp(desc){
  if(!desc) return null;
  const pats=[
    /(\d+)\+\s*years?/i,
    /minimum\s+(\d+)\s+years?/i,
    /at\s+least\s+(\d+)\s+years?/i,
    /(\d+)\s*[-–]\s*\d+\s*years?\s+of\s+experience/i,
    /(\d+)\s*years?\s+(?:of\s+)?(?:relevant|hands.on|professional|work)/i,
    /experience[:\s]+(\d+)\+?\s*years/i,
    /(\d+)\s*years?\s+experience/i,
    /proven\s+experience.*?(\d+)\+?\s*years/i,
  ];
  for(const p of pats){const m=desc.match(p);if(m)return parseInt(m[1]);}
  return null;
}
function senLabel(s){
  if(!s||s==='Not Applicable')return'';
  if(s==='Entry level')return'Entry';
  if(s==='Associate')return'Associate';
  if(/mid.senior/i.test(s))return'Mid-Senior';
  if(/director/i.test(s))return'Director';
  if(/executive/i.test(s))return'Executive';
  return s;
}
function timeAgo(iso){
  const h=Math.floor((Date.now()-new Date(iso))/3600000);
  if(h<1)return'Just now';
  if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function initials(n){return n.split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}

  {id:'4397189173',title:'Senior Graphic Designer',company:'Kynda Creative Agency',logo:'https://media.licdn.com/dms/image/v2/D4D0BAQF6T-ihzoiKbw/company-logo_100_100/company-logo_100_100/0/1709150630703/kyndacreative_logo',seniority:'Mid-Senior level',employment:'Contract',posted:'2026-04-03T00:28:29.000Z',remote:true,desc:'Senior Graphic Designer (remote contract) for a Dubai-based crypto, fintech, and web3 creative agency. Develop innovative visual concepts, branding materials, creating logos, and working with typography. Proficiency in Figma required. Experience in motion graphics is a plus. Strong portfolio of visually impactful design work expected.',link:'https://ae.linkedin.com/jobs/view/senior-graphic-designer-at-kynda-creative-agency-4397189173',cat:'Graphic Design'},
  {id:'4397521801',title:'Graphic Designer',company:'Salt',logo:'https://media.licdn.com/dms/image/v2/C4D0BAQGzKTBKVA4rtQ/company-logo_100_100/company-logo_100_100/0/1663684221112/salt_logo',seniority:'Associate',employment:'Full-time',posted:'2026-04-03T06:19:51.000Z',remote:false,desc:'Graphic Designer for a 106-year legacy premium-to-bridge department store in Dubai. Design homepage banners, hero visuals, landing pages, campaign art, emailers, and social media assets. 4+ years in fashion, premium/bridge retail, luxury, or high-design digital agency. Expert in Adobe Photoshop, Illustrator, After Effects. Up to 6,000 AED/month.',link:'https://ae.linkedin.com/jobs/view/graphic-designer-at-salt-4397521801',cat:'Graphic Design'},
  {id:'4366759047',title:'Graphic Designer',company:'IFF',logo:'https://media.licdn.com/dms/image/v2/D560BAQE4-cN3xhVPtw/company-logo_100_100/company-logo_100_100/0/1721142777314/iff_logo',seniority:'Mid-Senior level',employment:'Full-time',posted:'2026-04-03T09:56:34.000Z',remote:false,desc:'Graphic Designer for IFF Fine Fragrance division (Dubai or Singapore). Act as Creative Director — imagine and create concepts, mood boards, key visuals, storyboards, videos, motion graphics, social content, and packaging mockups. 2–3 years minimum relevant experience. Degree in Graphic Design. Proficiency in Adobe Creative Suite, Premiere Pro, and After Effects.',link:'https://ae.linkedin.com/jobs/view/graphic-designer-at-iff-4366759047',cat:'Graphic Design'},
  {id:'4397550414',title:'Graphic Designer',company:'Landmark Group',logo:'https://media.licdn.com/dms/image/v2/D4D0BAQFCZ8godwrqiQ/company-logo_100_100/company-logo_100_100/0/1736320079855/landmark_group_logo',seniority:'Mid-Senior level',employment:'Full-time',posted:'2026-04-03T10:45:29.000Z',remote:false,desc:'Graphic Designer for one of the region\'s largest omnichannel retail groups. 5+ years proven experience as a graphic designer. Create advertisements, social media graphics, website banners, product packaging, and promotional materials. Proficiency in Adobe Creative Suite (Photoshop, Illustrator, InDesign). Motion graphics or video editing experience is a plus.',link:'https://ae.linkedin.com/jobs/view/graphic-designer-at-landmark-group-4397550414',cat:'Graphic Design'},
  {id:'4364161025',title:'Interior Design Manager',company:'HIVE',logo:'https://media.licdn.com/dms/image/v2/D4E0BAQEkW8K3IxgHVQ/company-logo_100_100/company-logo_100_100/0/1727762249995/come_to_hive_logo',seniority:'Mid-Senior level',employment:'Full-time',posted:'2026-04-02T11:08:40.000Z',remote:false,desc:'Interior Design Manager to define and champion HIVE\'s interior design identity across a build-to-rent portfolio in UAE and KSA. Minimum 5 years experience in interior design with focus on hospitality, branded residential, or lifestyle projects. Strong FF&E specification, material selection, and interior lighting expertise. Degree in Interior Design, Interior Architecture, or Architecture.',link:'https://ae.linkedin.com/jobs/view/interior-design-manager-at-hive-4364161025',cat:'Design Management'},
  {id:'4397189174',title:'Fashion Designer',company:'Splash Fashions (Landmark Group)',logo:'https://media.licdn.com/dms/image/v2/D4D0BAQFCZ8godwrqiQ/company-logo_100_100/company-logo_100_100/0/1736320079855/landmark_group_logo',seniority:'Mid-Senior level',employment:'Full-time',posted:'2026-04-03T08:00:00.000Z',remote:false,desc:'Fashion Designer for Splash Fashions, one of the Middle East\'s leading fashion retail brands under Landmark Group. Design clothing collections, conduct trend research, pattern making, and sampling coordination. Minimum 3 years experience in fashion design. Strong portfolio demonstrating garment construction knowledge and creative aesthetic sensibility required.',link:'https://ae.linkedin.com/jobs/view/',cat:'Fashion Design'},

  {id:'4397544200',title:'Brand Designer',company:'Noon',logo:'',seniority:'Mid-Senior level',employment:'Full-time',posted:'2026-04-03T07:00:00.000Z',remote:false,desc:'Brand Designer for the region\'s largest e-commerce platform. Create visual identity assets, campaign creative, and digital marketing materials. 3–5 years brand design experience. Proficiency in Figma, Adobe Illustrator, and Photoshop. Strong understanding of brand systems and visual identity guidelines required.',link:'https://ae.linkedin.com/jobs/view/',cat:'Graphic Design'},
].map(j=>{
  const expN=parseExp(j.desc);
  return{...j,expN,expLabel:expN?expN+'+ years':null,senShort:senLabel(j.seniority)};

const CATS=['All',...[...new Set(RAW.map(j=>j.cat))]];
let activeCat='All';
let openId=null;

function expFilterVal(){return document.getElementById('expFilter').value;}
function expMinYears(val){const m=val.match(/(\d+)/);return m?parseInt(m[1]):0;}

function filtered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const sen=document.getElementById('senFilter').value;
  const typ=document.getElementById('typeFilter').value;
  const expVal=expFilterVal();
  const expMin=expVal?expMinYears(expVal):0;
  return RAW.filter(j=>{
    if(activeCat!=='All'&&j.cat!==activeCat)return false;
    if(q&&!j.title.toLowerCase().includes(q)&&!j.company.toLowerCase().includes(q))return false;
    if(sen&&j.senShort!==sen)return false;
    if(typ&&j.employment!==typ)return false;
    if(expMin&&(!j.expN||j.expN<expMin))return false;
    return true;
  });
}

function buildStats(jobs){
  const el=document.getElementById('stats');
  const cats=new Set(jobs.map(j=>j.cat)).size;
  const ft=jobs.filter(j=>j.employment==='Full-time').length;
  const rem=jobs.filter(j=>j.remote).length;
  el.innerHTML=[
    {n:jobs.length,l:'Total Jobs'},
    {n:cats,l:'Categories'},
    {n:ft,l:'Full-time'},
    {n:rem,l:'Remote'},
  ].map(s=>`<div class="stat-card"><div class="stat-n">${s.n}</div><div class="stat-l">${s.l}</div></div>`).join('');
}

function buildCats(){
  const el=document.getElementById('catRow');
  el.innerHTML=CATS.map(c=>`<span class="cat-pill${activeCat===c?' on':''}" onclick="setCat('${c}')">${c}</span>`).join('');
}

function setCat(c){activeCat=c;openId=null;render();}
function toggleCard(id){openId=openId===id?null:id;render();}

function render(){
  const jobs=filtered();
  buildStats(jobs);
  buildCats();
  document.getElementById('resCount').textContent=`${jobs.length} job${jobs.length!==1?'s':''} found`;
  const list=document.getElementById('jobList');
  if(!jobs.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">◌</div><div class="empty-text">No jobs match your filters.</div></div>`;
    return;
  }
  list.innerHTML=jobs.map(j=>{
    const isOpen=openId===j.id;
    const logoEl=j.logo
      ?`<img class="company-logo" src="${j.logo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="logo-fb" style="display:none">${initials(j.company)}</div>`
      :`<div class="logo-fb">${initials(j.company)}</div>`;
    const tags=[
      j.senShort?`<span class="tag tag-sen">${j.senShort}</span>`:'',
      j.expLabel?`<span class="tag tag-exp">${j.expLabel}</span>`:'',
      `<span class="tag tag-type">${j.employment}</span>`,
      j.remote?`<span class="tag tag-remote">Remote</span>`:'',
      `<span class="tag tag-cat">${j.cat}</span>`,
    ].filter(Boolean).join('');
    return`<div class="job-card${isOpen?' open':''}" onclick="toggleCard('${j.id}')">
      <div class="card-main">
        ${logoEl}
        <div class="card-body">
          <div class="card-top">
            <div class="job-title">${j.title}</div>
            <div class="card-time">${timeAgo(j.posted)}</div>
            <div class="card-chevron">▾</div>
          </div>
          <div class="job-company">${j.company} · Dubai, UAE</div>
          <div class="card-tags">${tags}</div>
        </div>
      </div>
      <div class="card-detail">
        <p class="detail-desc">${j.desc}</p>
        <div class="detail-actions">
          <a class="btn-apply" href="${j.link}" target="_blank" onclick="event.stopPropagation()">Apply on LinkedIn ↗</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
